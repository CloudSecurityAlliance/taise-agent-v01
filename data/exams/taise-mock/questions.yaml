exam_metadata:
  exam_id: taise-mock
  exam_name: TAISE Mock Examination
  version: '1.0'
  description: '60 mock multiple-choice questions covering all 10 modules of the CSA
    Trusted AI Safety Expert (TAISE) certification exam.

    '
  author: Cloud Security Alliance
  created_date: '2026-03-27'
  categories:
  - id: module_1
    name: Introduction to AI
    weight: 10
  - id: module_2
    name: Generative AI Architecture & Design
    weight: 10
  - id: module_3
    name: 'AI Use Cases: GenAI, Multimodal & AI Agents'
    weight: 10
  - id: module_4
    name: Ethics, Transparency & Explainability
    weight: 10
  - id: module_5
    name: AI Model Lifecycle & Threat Taxonomy
    weight: 10
  - id: module_6
    name: Governance, Risk Management & Compliance
    weight: 10
  - id: module_7
    name: Introduction to AI Safety & Security
    weight: 10
  - id: module_8
    name: Cloud & AI Security
    weight: 10
  - id: module_9
    name: Data Security & Privacy in AI Systems
    weight: 10
  - id: module_10
    name: Continuous Learning & Adaptation
    weight: 10
questions:
- question_id: TAISE-001
  category: module_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which historical event is widely regarded as the formal founding
    of artificial intelligence as an academic discipline?

    '
  options:
    A: The 1956 Dartmouth Conference organized by John McCarthy and colleagues
    B: The publication of Alan Turing's 1950 paper on machine intelligence
    C: The creation of the first neural network perceptron by Frank Rosenblatt in
      1958
    D: The development of ELIZA at MIT in 1966
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - 1956 Dartmouth Conference
  - John McCarthy
  - Formal founding of AI as a discipline
  explanation: 'The 1956 Dartmouth Conference, organized by John McCarthy, Marvin
    Minsky, Nathaniel Rochester, and Claude Shannon, is widely recognized as the event
    that formally established artificial intelligence as an academic field.

    '
- question_id: TAISE-002
  category: module_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Generative models differ from discriminative models primarily because
    generative models:

    '
  options:
    A: Learn the decision boundary P(Y|X) directly to classify inputs
    B: Require labeled data exclusively and cannot handle unsupervised learning
    C: Learn the joint probability distribution P(X,Y) and can synthesize new samples
      that resemble the training data
    D: Are limited to classification tasks and cannot produce new data instances
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Joint probability distribution P(X,Y)
  - Synthesize new samples
  - Distinction from discriminative models
  explanation: 'Generative models learn the joint distribution P(X,Y) of inputs and
    labels, enabling them to generate new data samples, whereas discriminative models
    learn the conditional P(Y|X) for classification.

    '
- question_id: TAISE-003
  category: module_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An organization wants to deploy a custom AI model with full control
    over the GPU infrastructure, networking, and storage layers. Which cloud service
    model is most appropriate?

    '
  options:
    A: Software as a Service (SaaS) with a managed AI endpoint
    B: Platform as a Service (PaaS) with managed ML pipelines
    C: Function as a Service (FaaS) with serverless inference
    D: Infrastructure as a Service (IaaS) providing raw compute and storage resources
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - IaaS provides full infrastructure control
  - GPU, networking, storage control
  - Custom deployment requirements
  explanation: 'IaaS provides raw compute, networking, and storage resources, giving
    the organization full control over the infrastructure stack needed for custom
    AI model deployment.

    '
- question_id: TAISE-004
  category: module_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the primary role of the attention mechanism in the transformer
    architecture?

    '
  options:
    A: It applies convolutional filters to extract local features from the input sequence
    B: It replaces recurrent connections by allowing each token to attend to all other
      tokens in the sequence simultaneously
    C: It enforces sequential token processing to preserve word order
    D: It reduces the dimensionality of input embeddings before the feed-forward layers
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Replaces recurrent connections
  - Parallel attention across all tokens
  - Transformer architecture
  explanation: 'The attention mechanism in transformers allows each token to attend
    to all other tokens simultaneously, eliminating the need for sequential recurrent
    processing and enabling parallelized computation.

    '
- question_id: TAISE-005
  category: module_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which statement accurately describes large language models (LLMs)?

    '
  options:
    A: LLMs are generative models based on the transformer architecture, pretrained
      on massive text corpora using self-supervised objectives such as next-token
      prediction
    B: LLMs are discriminative classifiers trained exclusively on labeled sentiment
      datasets
    C: LLMs rely on recurrent neural network architectures limited to 512-token sequences
    D: LLMs are rule-based systems that use knowledge graphs as their sole information
      source
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Transformer architecture
  - Self-supervised pretraining
  - Next-token prediction
  explanation: 'LLMs are generative models built on the transformer architecture,
    pretrained on large text corpora using self-supervised learning objectives like
    next-token prediction to learn language patterns.

    '
- question_id: TAISE-006
  category: module_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'A multimodal AI system is best characterized by its ability to:

    '
  options:
    A: Process only text input but generate outputs in multiple languages
    B: Accept and reason over multiple input types such as text, images, audio, and
      video within a unified model
    C: Use multiple separate single-modality models with no shared representation
    D: Generate only one modality of output regardless of input types
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Multiple input types
  - Unified model
  - Text, images, audio, video
  explanation: 'A multimodal AI system processes and reasons across multiple data
    modalities such as text, images, audio, and video within a single unified model
    architecture.

    '
- question_id: TAISE-007
  category: module_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'In the transformer self-attention mechanism, each token produces
    Q, K, and V vectors through learned linear projections. Attention scores are computed
    as:

    '
  options:
    A: softmax(QK^T / sqrt(d_k)) then multiplied by V to produce context-aware representations
    B: The sum of Q, K, and V positional encodings
    C: A random dot product of Q and K without scaling
    D: A fixed linear transformation of V only, ignoring Q and K
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Scaled dot-product attention formula
  - softmax normalization
  - sqrt(d_k) scaling factor
  explanation: 'Transformer self-attention computes scores via softmax(QK^T / sqrt(d_k))
    * V, where the scaling factor sqrt(d_k) prevents vanishing gradients in the softmax
    for large key dimensions.

    '
- question_id: TAISE-008
  category: module_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Diffusion models generate new data samples by:

    '
  options:
    A: Training a generator and discriminator in an adversarial loop until realistic
      outputs emerge
    B: Encoding inputs to a latent space using a variational lower bound and then
      sampling
    C: Applying a forward process that gradually adds Gaussian noise to data, then
      learning a reverse denoising process that iteratively removes noise to reconstruct
      coherent samples
    D: Using autoregressive token-by-token generation conditioned on previously generated
      tokens
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Forward noising process
  - Reverse denoising process
  - Gaussian noise
  explanation: 'Diffusion models work by first adding noise to data through a forward
    process and then learning to reverse that process, iteratively denoising to generate
    new coherent samples.

    '
- question_id: TAISE-009
  category: module_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In a GAN, the relationship between the generator and discriminator
    during training is best described as:

    '
  options:
    A: A cooperative process to jointly minimize reconstruction loss
    B: The discriminator generates candidates and the generator evaluates quality
    C: The generator must fully converge before the discriminator begins training
    D: A minimax game where the generator produces realistic samples while the discriminator
      tries to distinguish real from generated
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Minimax game
  - Generator produces samples
  - Discriminator distinguishes real from fake
  explanation: 'GANs employ a minimax adversarial training framework where the generator
    learns to produce increasingly realistic samples while the discriminator learns
    to differentiate real data from generated outputs.

    '
- question_id: TAISE-010
  category: module_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'Retrieval Augmented Generation (RAG) differs from Knowledge Augmented
    Generation (KAG) in that:

    '
  options:
    A: RAG retrieves relevant documents from an external corpus at inference time,
      while KAG integrates structured knowledge graphs and entity-relationship reasoning
      for more precise factual responses
    B: RAG fine-tunes the model on retrieved documents while KAG uses prompt injection
      only
    C: RAG and KAG are identical approaches with different names
    D: RAG requires model retraining for each new knowledge source
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - RAG retrieves documents at inference time
  - KAG uses structured knowledge graphs
  - Entity-relationship reasoning
  explanation: 'RAG retrieves relevant documents from external corpora during inference,
    while KAG leverages structured knowledge graphs and entity-relationship reasoning
    to provide more precise and factually grounded responses.

    '
- question_id: TAISE-011
  category: module_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'In a VAE, the training objective includes a KL divergence term that:

    '
  options:
    A: Acts as a discriminator loss distinguishing real from generated samples
    B: Computes a contrastive loss between positive and negative sample pairs
    C: Only measures reconstruction accuracy with no regularization
    D: Regularizes the latent space to follow a prior distribution, combined with
      reconstruction loss
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - KL divergence regularization
  - Latent space prior distribution
  - Combined with reconstruction loss
  explanation: 'The KL divergence term in a VAE regularizes the encoder''s latent
    distribution to approximate a chosen prior (typically standard normal), balancing
    with reconstruction loss to enable meaningful generation.

    '
- question_id: TAISE-012
  category: module_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'When building a RAG pipeline, which component is most critical for
    retrieval relevance?

    '
  options:
    A: A generative model with the maximum parameter count available
    B: A high-quality embedding model and vector store with effective similarity search
      and chunking strategy
    C: A rule-based keyword matching system with exact string lookup
    D: A classification model that categorizes queries before generation
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Embedding model quality
  - Vector store with similarity search
  - Chunking strategy
  explanation: 'The embedding model and vector store with effective similarity search
    and chunking strategy are most critical for RAG retrieval relevance, as they determine
    how well relevant context is matched to queries.

    '
- question_id: TAISE-013
  category: module_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'AI-generated deepfakes pose a significant enterprise risk primarily
    because they can:

    '
  options:
    A: Only affect entertainment media with no enterprise impact
    B: Always be detected by current commercial antivirus solutions
    C: Be used for social engineering, fraud, and disinformation by creating convincing
      synthetic media of real individuals, undermining trust and authentication mechanisms
    D: Only be created with physical access to a target's device
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Social engineering and fraud
  - Synthetic media of real individuals
  - Undermining trust and authentication
  explanation: 'Deepfakes create significant enterprise risk through social engineering,
    fraud, and disinformation by generating convincing synthetic media that can bypass
    identity verification and undermine organizational trust.

    '
- question_id: TAISE-014
  category: module_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An AI agent differs from a standard chatbot primarily because an
    AI agent can:

    '
  options:
    A: Only respond to text queries while chatbots handle multimodal inputs
    B: Autonomously plan, use tools, execute multi-step tasks, and interact with external
      systems beyond single-turn conversation
    C: Operate exclusively offline while chatbots require internet connectivity
    D: Function without any training data while chatbots need large datasets
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Autonomous planning
  - Tool use and multi-step tasks
  - External system interaction
  explanation: 'AI agents distinguish themselves from chatbots through autonomous
    planning, tool use, multi-step task execution, and the ability to interact with
    external systems beyond simple conversational exchanges.

    '
- question_id: TAISE-015
  category: module_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'A healthcare AI diagnostic system trained predominantly on data
    from one demographic group will most likely suffer from:

    '
  options:
    A: Algorithmic bias from the model architecture
    B: Deployment bias from incorrect clinical integration
    C: Sampling bias due to non-representative training data that overrepresents certain
      demographics
    D: Historical bias encoded by past medical practitioners
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Sampling bias
  - Non-representative training data
  - Demographic overrepresentation
  explanation: 'Training predominantly on one demographic group introduces sampling
    bias, where the non-representative data causes the model to perform poorly on
    underrepresented populations.

    '
- question_id: TAISE-016
  category: module_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In the responsible AI lifecycle, ethical impact assessments and
    bias audits should first be conducted:

    '
  options:
    A: Only after the model is deployed to production
    B: Only during annual compliance reviews after deployment
    C: Exclusively during the model decommissioning phase
    D: During the data collection and model design phase before any training begins
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Early lifecycle stage
  - Before training begins
  - Data collection and design phase
  explanation: 'Ethical impact assessments and bias audits should begin during data
    collection and model design to identify and mitigate potential harms before they
    become embedded in the trained model.

    '
- question_id: TAISE-017
  category: module_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Deployment bias in AI systems describes the situation where:

    '
  options:
    A: The model architecture introduces systematic errors
    B: The training data contains historical prejudices
    C: The model performs well in testing but exhibits discriminatory behavior due
      to mismatches between test and real-world deployment conditions
    D: The sampling methodology excludes minority populations
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Test vs. real-world mismatch
  - Discriminatory behavior in deployment
  - Performance gap between testing and production
  explanation: 'Deployment bias occurs when a model that performs well in controlled
    testing exhibits discriminatory behavior in production due to mismatches between
    test conditions and real-world deployment environments.

    '
- question_id: TAISE-018
  category: module_3
  question_type: multiple_choice
  difficulty: hard
  question_text: 'SHAP provides AI model explainability by assigning each feature
    an importance value based on:

    '
  options:
    A: Retraining the model with each feature removed one at a time
    B: Generating a single global decision tree that approximates the original model
    C: Visualizing the model's internal layer activations as a heatmap
    D: Shapley values from cooperative game theory, representing each feature's marginal
      contribution across all possible feature coalitions
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Shapley values
  - Cooperative game theory
  - Marginal contribution across feature coalitions
  explanation: 'SHAP uses Shapley values from cooperative game theory to compute each
    feature''s marginal contribution across all possible feature coalitions, providing
    theoretically consistent and fair attribution scores.

    '
- question_id: TAISE-019
  category: module_4
  question_type: multiple_choice
  difficulty: hard
  question_text: 'LIME differs from SHAP in that LIME:

    '
  options:
    A: Provides global explanations for the entire model while SHAP only explains
      individual predictions
    B: Generates local explanations by perturbing inputs around a specific instance
      and fitting an interpretable surrogate model, while SHAP provides theoretically
      consistent Shapley-based attributions
    C: Requires access to model internals while SHAP is model-agnostic
    D: Only works with image models while SHAP only works with tabular data
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Local perturbation-based explanations
  - Interpretable surrogate model
  - Contrast with Shapley-based consistency
  explanation: 'LIME generates local explanations by perturbing inputs around a specific
    instance and fitting a simple interpretable model, while SHAP provides mathematically
    consistent attributions grounded in Shapley value theory.

    '
- question_id: TAISE-020
  category: module_4
  question_type: multiple_choice
  difficulty: easy
  question_text: 'A model card is a standardized documentation artifact that:

    '
  options:
    A: Specifies the GPU hardware used during training
    B: Serves as an access credential for API authentication
    C: Describes a model's intended use, training data, performance metrics, limitations,
      ethical considerations, and evaluation results across demographic groups
    D: Provides a financial cost summary for model development
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Intended use and limitations
  - Performance metrics and evaluation
  - Ethical considerations
  explanation: 'Model cards are standardized documentation that describe a model''s
    intended use, training data, performance metrics, limitations, ethical considerations,
    and demographic evaluation results for transparency and accountability.

    '
- question_id: TAISE-021
  category: module_4
  question_type: multiple_choice
  difficulty: hard
  question_text: 'Equalized odds as a fairness metric requires that:

    '
  options:
    A: The model achieves the same overall accuracy across all test datasets
    B: The model's true positive rate and false positive rate are equal across protected
      groups, ensuring error rates do not disproportionately affect any group
    C: All features are weighted equally regardless of predictive power
    D: The training data contains exactly equal representation of all demographic
      groups
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - True positive rate equality
  - False positive rate equality
  - Across protected groups
  explanation: 'Equalized odds requires that both the true positive rate and false
    positive rate are equal across protected groups, ensuring the model''s errors
    are distributed equitably.

    '
- question_id: TAISE-022
  category: module_4
  question_type: multiple_choice
  difficulty: hard
  question_text: 'Integrated Gradients computes feature attributions by:

    '
  options:
    A: Computing the path integral of gradients along a straight line from a baseline
      input to the actual input, attributing the prediction difference to each feature
    B: Training a secondary model to predict feature importances
    C: Randomly masking input features and measuring output variance
    D: Counting the frequency of each feature across the training dataset
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Path integral of gradients
  - Baseline to actual input
  - Feature attribution
  explanation: 'Integrated Gradients computes the path integral of gradients along
    a straight line from a baseline input to the actual input, providing axiomatic
    feature attributions that satisfy sensitivity and implementation invariance.

    '
- question_id: TAISE-023
  category: module_4
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Data poisoning attacks are most effective during which AI lifecycle
    phase?

    '
  options:
    A: Model serving and inference
    B: Model documentation and reporting
    C: Data collection and preprocessing, where adversaries inject malicious samples
      to manipulate learned decision boundaries
    D: Post-deployment monitoring
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Data collection and preprocessing phase
  - Malicious sample injection
  - Decision boundary manipulation
  explanation: 'Data poisoning attacks are most effective during data collection and
    preprocessing, when adversaries can inject malicious samples that corrupt the
    model''s learned decision boundaries during training.

    '
- question_id: TAISE-024
  category: module_4
  question_type: multiple_choice
  difficulty: medium
  question_text: 'A backdoor attack on an AI model involves embedding a hidden trigger
    pattern during training so the model:

    '
  options:
    A: Overwhelms the API with excessive requests when triggered
    B: Behaves normally on clean inputs but produces attacker-chosen outputs when
      the trigger pattern is present
    C: Physically damages the hardware running the model
    D: Intercepts network traffic between client and endpoint
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Hidden trigger pattern
  - Normal behavior on clean inputs
  - Attacker-chosen outputs on trigger
  explanation: 'Backdoor attacks embed a hidden trigger during training that causes
    the model to behave normally on clean inputs but produce attacker-specified outputs
    when the trigger pattern is present in the input.

    '
- question_id: TAISE-025
  category: module_5
  question_type: multiple_choice
  difficulty: medium
  question_text: 'The NIST AI RMF defines four core functions: GOVERN, MAP, MEASURE,
    and MANAGE. The MAP function specifically:

    '
  options:
    A: Establishes accountability structures and policies for responsible AI
    B: Identifies the AI system's context, intended use, and catalogs risks across
      the AI lifecycle
    C: Implements risk response strategies and continuous monitoring
    D: Assesses and quantitatively tracks identified risks over time
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Context and intended use identification
  - Risk cataloging
  - AI lifecycle scope
  explanation: 'The MAP function in the NIST AI RMF identifies the AI system''s context,
    stakeholders, and intended use while cataloging risks across the full AI lifecycle
    to inform risk assessment and management.

    '
- question_id: TAISE-026
  category: module_5
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Concept drift in deployed AI models refers to:

    '
  options:
    A: The model's source code being modified after deployment
    B: The model consuming increasing amounts of memory over time
    C: A deliberate retraining strategy where the objective function is periodically
      changed
    D: Changes in the statistical relationship between features and the target variable
      over time, causing performance degradation
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Statistical relationship changes
