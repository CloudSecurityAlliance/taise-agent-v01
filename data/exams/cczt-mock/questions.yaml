    '
- question_id: CCZT-028
  category: domain_3
  question_type: multiple_choice
  difficulty: hard
  question_text: 'An organization is transitioning to Zero Trust but faces resistance
    from employees accustomed to unrestricted internal network access. Which strategic
    approach best addresses this challenge?

    '
  options:
    A: Implementing Zero Trust controls without informing employees to avoid pushback
    B: Exempting resistant departments from Zero Trust policies
    C: Conducting workforce training and communicating how Zero Trust protects both
      the organization and individual users
    D: Delaying Zero Trust implementation until all employees voluntarily adopt new
      practices
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Workforce training and communication
  - Change management for cultural shift
  explanation: 'Conducting workforce training and clearly communicating the benefits
    of Zero Trust for both the organization and individual users is the most effective
    approach to overcoming resistance, as it addresses the cultural shift through
    education.

    '
- question_id: CCZT-029
  category: domain_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which of the following is a common organizational challenge when
    adopting Zero Trust strategy?

    '
  options:
    A: Zero Trust can only be implemented by organizations with cloud-native infrastructure
