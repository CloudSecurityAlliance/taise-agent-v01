exam_metadata:
  exam_id: cczt-mock
  exam_name: CCZT Mock Examination
  version: '1.0'
  description: '60 mock multiple-choice questions covering all 5 domains of the CSA
    Certificate of Competence in Zero Trust (CCZT) certification exam.

    '
  author: Cloud Security Alliance
  created_date: '2026-03-27'
  categories:
  - id: domain_1
    name: Introduction to Zero Trust Architecture
    weight: 20
  - id: domain_2
    name: Introduction to Software-Defined Perimeter
    weight: 20
  - id: domain_3
    name: Zero Trust Strategy
    weight: 20
  - id: domain_4
    name: Zero Trust Planning
    weight: 20
  - id: domain_5
    name: Zero Trust Implementation
    weight: 20
questions:
- question_id: CCZT-001
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which of the following best describes the core principle of Zero
    Trust Architecture?

    '
  options:
    A: All internal network traffic is inherently trusted once authenticated at the
      perimeter
    B: Trust is granted based on network location and IP address
    C: No implicit trust is granted to any entity regardless of network location or
      prior authentication
    D: Trust is established permanently after initial multi-factor authentication
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - No implicit trust
  - Network location irrelevant
  - Continuous verification required
  explanation: 'Zero Trust Architecture is fundamentally based on the principle that
    no entity should be implicitly trusted regardless of its network location or prior
    authentication status. Every access request must be explicitly verified.

    '
- question_id: CCZT-002
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In Zero Trust Architecture, which component is responsible for making
    access decisions based on policy?

    '
  options:
    A: Policy Enforcement Point (PEP)
    B: Policy Decision Point (PDP)
    C: Policy Information Point (PIP)
    D: Policy Administration Point (PAP)
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Policy Decision Point evaluates requests
  - PDP makes allow/deny decisions
  explanation: 'The Policy Decision Point (PDP) is responsible for evaluating access
    requests against defined policies and making the allow or deny decision. The PEP
    enforces those decisions, while the PIP provides data inputs.

    '
- question_id: CCZT-003
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'According to NIST SP 800-207, which of the following is NOT one
    of the three primary approaches to implementing Zero Trust?

    '
  options:
    A: Enhanced identity governance
    B: Micro-segmentation
    C: Software-defined perimeters
    D: Endpoint detection and response
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - NIST SP 800-207 three approaches
  - EDR is not a ZTA implementation approach
  explanation: 'NIST SP 800-207 defines three primary approaches to Zero Trust: enhanced
    identity governance, micro-segmentation, and software-defined perimeters. Endpoint
    detection and response is a security tool but not one of the defined ZTA approaches.

    '
- question_id: CCZT-004
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'The DAAS model in Zero Trust refers to the elements that make up
    the protect surface. What does DAAS stand for?

    '
  options:
    A: Data, Applications, Assets, Services
    B: Detection, Authentication, Authorization, Services
    C: Data, Authentication, Assets, Security
    D: Detection, Applications, Access, Services
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Data, Applications, Assets, Services
  - Protect surface components
  explanation: 'DAAS stands for Data, Applications, Assets, and Services. These are
    the four categories of elements that make up the protect surface in Zero Trust
    methodology.

    '
- question_id: CCZT-005
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which Zero Trust tenet assumes that an adversary may already have
    a presence inside the network?

    '
  options:
    A: Least privilege access
    B: Never trust, always verify
    C: Assume breach
    D: Explicit verification
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Assume breach tenet
  - Adversary already inside network
  explanation: 'The assume breach tenet operates on the assumption that an adversary
    may already have a presence inside the network, driving organizations to implement
    controls that limit lateral movement and minimize blast radius.

    '
- question_id: CCZT-006
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In the Zero Trust pillar framework, which cross-cutting capability
    provides the ability to correlate events and detect anomalies across all pillars?

    '
  options:
    A: Automation and Orchestration
    B: Identity Management
    C: Governance
    D: Visibility and Analytics
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Visibility and Analytics cross-cutting capability
  - Event correlation and anomaly detection
  explanation: 'Visibility and Analytics is the cross-cutting capability that provides
    the ability to correlate events and detect anomalies across all Zero Trust pillars,
    enabling continuous monitoring and informed policy decisions.

    '
- question_id: CCZT-007
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the primary difference between the protect surface and the
    attack surface in Zero Trust methodology?

    '
  options:
    A: The protect surface focuses on critical assets that need protection and is
      smaller than the attack surface
    B: The protect surface is always larger than the attack surface
    C: The attack surface is fixed while the protect surface constantly changes
    D: The protect surface includes only network perimeters while the attack surface
      includes endpoints
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Protect surface is smaller and focused
  - Critical assets requiring protection
  explanation: 'The protect surface focuses on the most critical assets (DAAS elements)
    that need protection and is deliberately smaller and more manageable than the
    ever-expanding attack surface, making it a more practical foundation for security
    controls.

    '
- question_id: CCZT-008
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which NIST SP 800-207 approach relies on network-based segmentation
    to create isolated zones of trust?

    '
  options:
    A: Software-defined perimeters
    B: Enhanced identity governance
    C: Micro-segmentation
    D: Network access control
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Micro-segmentation uses network-based segmentation
  - Isolated zones of trust
  explanation: 'Micro-segmentation relies on network-based segmentation to create
    isolated zones, controlling traffic flow between segments and limiting lateral
    movement within the network.

    '
- question_id: CCZT-009
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In Zero Trust Architecture, what is the role of the Policy Enforcement
    Point (PEP)?

    '
  options:
    A: It evaluates access requests against defined policies
    B: It stores and manages all security policies
    C: It enforces the decisions made by the Policy Decision Point
    D: It collects environmental data for policy evaluation
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - PEP enforces PDP decisions
  - Enforcement vs. decision-making distinction
  explanation: 'The Policy Enforcement Point (PEP) enforces the access decisions made
    by the Policy Decision Point (PDP). It is the component that actually allows or
    blocks access based on the PDP''s determination.

    '
- question_id: CCZT-010
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which Zero Trust design principle states that access should be limited
    to the minimum necessary for a user to perform their function?

    '
  options:
    A: Defense in depth
    B: Least privilege
    C: Separation of duties
    D: Assume breach
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Least privilege principle
  - Minimum necessary access
  explanation: 'The least privilege principle states that access should be limited
    to the minimum necessary for a user to perform their function, reducing the potential
    impact of compromised credentials or insider threats.

    '
- question_id: CCZT-011
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'A Zero Trust Architecture treats every access request as though
    it originates from an untrusted network. Which tenet does this most directly reflect?

    '
  options:
    A: Never trust, always verify
    B: Continuous monitoring
    C: Assume breach
    D: Micro-segmentation
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Never trust, always verify
  - All requests treated as untrusted
  explanation: 'The "never trust, always verify" tenet directly reflects the practice
    of treating every access request as originating from an untrusted network, requiring
    explicit verification regardless of source.

    '
- question_id: CCZT-012
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which of the following is a business objective commonly associated
    with Zero Trust adoption?

    '
  options:
    A: Eliminating the need for firewalls entirely
    B: Reducing security complexity by removing all access controls
    C: Replacing all legacy systems within 12 months
    D: Improving security posture while enabling digital transformation
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Improved security posture
  - Enabling digital transformation
  explanation: 'Zero Trust adoption is commonly driven by the business objective of
    improving security posture while simultaneously enabling digital transformation,
    supporting modern work patterns like remote access and cloud adoption securely.

    '
- question_id: CCZT-013
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the primary function of the SDP Controller in a Software-Defined
    Perimeter architecture?

    '
  options:
    A: Authenticating and authorizing users before granting access to resources
    B: Monitoring network traffic for anomalies
    C: Encrypting all data in transit between hosts
    D: Generating Single Packet Authorization tokens on behalf of clients
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - SDP Controller authenticates and authorizes
  - Access granted only after controller approval
  explanation: 'The SDP Controller is the central component responsible for authenticating
    and authorizing users before granting them access to protected resources, acting
    as the trust broker in the SDP architecture.

    '
- question_id: CCZT-014
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In SDP architecture, what is Single Packet Authorization (SPA) primarily
    used for?

    '
  options:
    A: Encrypting the first packet of every new session
    B: Compressing initial handshake packets for performance optimization
    C: Authorizing administrative access to the SDP Controller
    D: Sending a cryptographic packet to prove identity before a connection is established
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Cryptographic packet for identity proof
  - Pre-connection authentication
  explanation: 'Single Packet Authorization (SPA) sends a cryptographic packet to
    prove the sender''s identity before any connection is established, ensuring that
    only authorized entities can even initiate communication with protected resources.

    '
- question_id: CCZT-015
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which SDP component acts as the gateway that accepts connections
    only after authorization from the SDP Controller?

    '
  options:
    A: Initiating Host (IH)
    B: SDP Gateway
    C: Policy Decision Point
    D: Accepting Host (AH)
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - SDP Gateway accepts connections
  - Controller authorization required first
  explanation: 'The SDP Gateway acts as the entry point that accepts connections only
    after the SDP Controller has authenticated and authorized the requesting entity,
    serving as the enforcement point in the architecture.

    '
- question_id: CCZT-016
  category: domain_2
  question_type: multiple_choice
  difficulty: easy
  question_text: 'In an SDP deployment, what does a drop-all firewall do?

    '
  options:
    A: Drops all packets that exceed a configured bandwidth threshold
    B: Terminates all connections after a timeout period
    C: Filters packets based on deep packet inspection rules
    D: Blocks all inbound connection attempts by default until explicitly authorized
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Default deny all inbound connections
  - Explicit authorization required
  explanation: 'A drop-all firewall blocks all inbound connection attempts by default
    until explicitly authorized, making protected services invisible to unauthorized
    users and preventing reconnaissance attacks.

    '
- question_id: CCZT-017
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'How does SDP differ from traditional VPN in terms of network visibility?

    '
  options:
    A: SDP provides full network access once authenticated like a VPN but with stronger
      encryption
    B: SDP grants access only to specific authorized resources while keeping all other
      infrastructure invisible
    C: SDP uses the same tunneling protocols as VPN but adds an extra authentication
      layer
    D: SDP requires users to be on the corporate network unlike VPN which allows remote
      access
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Granular resource-level access
  - Infrastructure invisibility
  explanation: 'Unlike VPNs which typically grant broad network access after authentication,
    SDP grants access only to specific authorized resources while keeping all other
    infrastructure invisible to the user, significantly reducing the attack surface.

    '
- question_id: CCZT-018
  category: domain_2
  question_type: multiple_choice
  difficulty: easy
  question_text: 'What is the term for the SDP capability that makes infrastructure
    invisible to unauthorized users by not responding to any connection attempts?

    '
  options:
    A: Stealth mode
    B: Cloaking
    C: Network masking
    D: Dark networking
  correct_answer: B
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Cloaking capability
  - Infrastructure invisibility to unauthorized users
  explanation: 'Cloaking is the SDP capability that makes infrastructure invisible
    to unauthorized users by not responding to any connection attempts, effectively
    hiding services from port scanning and reconnaissance.

    '
- question_id: CCZT-019
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In SDP architecture, mutual TLS (mTLS) ensures which of the following?

    '
  options:
    A: Both the client and server authenticate to each other
    B: Only the client authenticates to the server
    C: Only the server authenticates to the client
    D: Neither party authenticates, but the channel is encrypted
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Mutual authentication
  - Both client and server verify identity
  explanation: 'Mutual TLS (mTLS) ensures that both the client and server authenticate
    to each other using certificates, providing bidirectional identity verification
    and establishing a trusted encrypted communication channel.

    '
- question_id: CCZT-020
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which SDP deployment model places the SDP Gateway in front of application
    servers to protect them from unauthorized access?

    '
  options:
    A: Client-to-server model
    B: Gateway-to-gateway model
    C: Client-to-gateway model
    D: Server-to-server model
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Client-to-gateway deployment model
  - Gateway protects application servers
  explanation: 'The client-to-gateway model places the SDP Gateway in front of application
    servers, requiring clients to authenticate through the gateway before accessing
    the protected applications behind it.

    '
- question_id: CCZT-021
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the primary role of the Initiating Host (IH) in SDP architecture?

    '
  options:
    A: It sends a Single Packet Authorization request and initiates the connection
      after controller authorization
    B: It hosts the applications and services being protected
    C: It acts as the intermediary between the user and the SDP Gateway
    D: It manages the certificate authority for mTLS
  correct_answer: A
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Initiating Host sends SPA request
  - Initiates connection after authorization
  explanation: 'The Initiating Host (IH) is the client-side component that sends a
    Single Packet Authorization request to the SDP Controller and initiates the connection
    to the gateway or accepting host after receiving authorization.

    '
- question_id: CCZT-022
  category: domain_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'In the context of SDP, what does control plane and data plane separation
    achieve?

    '
  options:
    A: It physically separates networking hardware for security
    B: It allows administrators to manage policies from the data plane
    C: It eliminates the need for encryption on the data plane
    D: It ensures that authentication decisions and data transmission occur on different
      channels, reducing the attack surface
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Separation of authentication and data transmission
  - Reduced attack surface through channel isolation
  explanation: 'Control plane and data plane separation ensures that authentication
    decisions and data transmission occur on different channels, reducing the attack
    surface by preventing attackers from exploiting the authentication mechanism through
    the data channel.

    '
- question_id: CCZT-023
  category: domain_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'Which of the following threats does SDP most effectively mitigate
    compared to traditional perimeter security?

    '
  options:
    A: Insider threats from authenticated users with valid credentials
    B: Social engineering attacks against end users
    C: Physical theft of endpoint devices
    D: Distributed denial-of-service attacks targeting visible, publicly exposed services
  correct_answer: D
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - DDoS mitigation through service invisibility
  - SDP hides services from attackers
  explanation: 'SDP most effectively mitigates DDoS attacks against publicly exposed
    services because its cloaking capability makes infrastructure invisible to unauthorized
    users, preventing attackers from discovering and targeting services.

    '
- question_id: CCZT-024
  category: domain_2
  question_type: multiple_choice
  difficulty: hard
  question_text: 'An organization wants to ensure that its servers are invisible to
    port scanning tools. Which SDP mechanism provides this protection?

    '
  options:
    A: Mutual TLS authentication
    B: Network address translation
    C: Single Packet Authorization with drop-all firewall
    D: Intrusion prevention system
  correct_answer: C
  scoring_rubric:
    3: Selects correct and explains reasoning thoroughly
    2: Selects correct with basic reasoning
    1: Selects partially correct answer with some relevant reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - SPA combined with drop-all firewall
  - No response to unauthorized connection attempts
  explanation: 'Single Packet Authorization combined with a drop-all firewall makes
    servers invisible to port scanning by not responding to any connection attempts
    unless a valid SPA token is received first.

    '
- question_id: CCZT-025
  category: domain_3
