questions:
- question_id: CCSK-001
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which characteristic of cloud computing as defined by ISO/IEC 22123-1:2023
    allows resources to be provisioned and released with minimal management effort?

    '
  options:
    A: Measured service
    B: Broad network access
    C: Rapid elasticity
    D: On-demand self-service
  correct_answer: D
  scoring_rubric:
    3: Selects D (On-demand self-service) and explains that this characteristic enables
      consumers to provision resources automatically without requiring human interaction
      with the provider
    2: Selects D with basic reasoning
    1: Selects a partially correct answer such as C (Rapid elasticity) with some relevant
      reasoning about provisioning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - On-demand self-service as a core cloud characteristic
  - Minimal management effort and automatic provisioning
  - ISO/IEC 22123-1:2023 cloud computing definition
  explanation: 'On-demand self-service is the cloud characteristic that allows consumers
    to unilaterally provision computing capabilities, such as server time and network
    storage, as needed automatically without requiring human interaction with the
    service provider.

    '
- question_id: CCSK-002
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In a shared responsibility model for IaaS, which layer is the cloud
    customer MOST responsible for securing?

    '
  options:
    A: Operating system and applications
    B: Hypervisor firmware
    C: Physical data center infrastructure
    D: Network backbone between availability zones
  correct_answer: A
  scoring_rubric:
    3: Selects A (Operating system and applications) and explains the IaaS shared
      responsibility boundary clearly
    2: Selects A with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about shared
      responsibility
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - IaaS shared responsibility model
  - Customer responsibility for OS and application layers
  - Provider responsibility for physical and hypervisor layers
  explanation: 'In IaaS, the cloud provider manages the physical infrastructure and
    hypervisor, while the customer is responsible for everything from the operating
    system up, including applications, data, and runtime configurations.

    '
- question_id: CCSK-003
  category: domain_1
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which cloud deployment model restricts infrastructure access to
    a group of related organizations with shared concerns such as compliance requirements?

    '
  options:
    A: Private cloud
    B: Community cloud
    C: Public cloud
    D: Hybrid cloud
  correct_answer: A
  scoring_rubric:
    3: Selects A (Private cloud) and explains that private cloud restricts access
      to a single organization or group with shared concerns
    2: Selects A with basic reasoning
    1: Selects B (Community cloud) with reasoning about shared concerns among organizations
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Private cloud deployment model
  - Restricted access for related organizations
  - Shared compliance or regulatory concerns
  explanation: 'A private cloud is provisioned for exclusive use by a single organization
    or a group of related organizations with shared concerns such as mission, security
    requirements, policy, or compliance considerations.

    '
- question_id: CCSK-004
  category: domain_1
  question_type: medium
  difficulty: medium
  question_text: 'Abstraction in cloud computing primarily enables which of the following?

    '
  options:
    A: Hiding lower-level complexity so consumers interact with simplified interfaces
    B: Guaranteeing zero-downtime deployments
    C: Removing the need for identity management
    D: Eliminating the need for encryption at rest
  correct_answer: B
  scoring_rubric:
    3: Selects B (Guaranteeing zero-downtime deployments) and explains how abstraction
      layers simplify consumer interaction with cloud resources
    2: Selects B with basic reasoning
    1: Selects A with reasoning about abstraction hiding complexity, which is a reasonable
      interpretation
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Abstraction as a fundamental cloud concept
  - Simplified interfaces for consumers
  - Hiding infrastructure complexity
  explanation: 'Abstraction in cloud computing enables consumers to interact with
    simplified interfaces by hiding the underlying complexity of the infrastructure,
    allowing users to focus on their workloads rather than the physical or virtual
    resource management.

    '
- question_id: CCSK-005
  category: domain_1
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An organization deploys workloads across multiple cloud providers
    while maintaining a single control plane. Which essential cloud concept does this
    BEST illustrate?

    '
  options:
    A: Multi-tenancy
    B: Measured service
    C: Resource pooling
    D: Orchestration
  correct_answer: D
  scoring_rubric:
    3: Selects D (Orchestration) and explains how orchestration coordinates workloads
      across multiple providers through a unified control plane
    2: Selects D with basic reasoning
    1: Selects a partially correct answer such as C (Resource pooling) with some relevant
      reasoning
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Orchestration across multiple cloud providers
  - Single control plane for unified management
  - Multi-cloud workload coordination
  explanation: 'Orchestration refers to the coordinated management of multiple cloud
    resources and workloads through a single control plane, enabling an organization
    to deploy and manage services across multiple cloud providers in a unified manner.

    '
- question_id: CCSK-006
  category: domain_2
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which governance document sits at the TOP of the cloud governance
    hierarchy and expresses management intent and direction?

    '
  options:
    A: Policy
    B: Procedure
    C: Standard
    D: Control baseline
  correct_answer: A
  scoring_rubric:
    3: Selects A (Policy) and explains the governance hierarchy with policy at the
      top expressing management intent
    2: Selects A with basic reasoning
    1: Selects C (Standard) with some relevant reasoning about governance hierarchy
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Policy as the top-level governance document
  - Expression of management intent and direction
  - 'Governance hierarchy: policy, standards, procedures'
  explanation: 'In the governance hierarchy, policies sit at the top and express management''s
    intent and direction. Standards define specific requirements to implement policies,
    and procedures provide step-by-step instructions for carrying out standards.

    '
- question_id: CCSK-007
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'A CISO wants to align cloud security controls with a recognized
    industry framework that maps to multiple regulations. Which CSA resource is specifically
    designed for this purpose?

    '
  options:
    A: CSA Trusted Cloud Consultant Program
    B: CSA Security Guidance narrative chapters
    C: CSA Code of Conduct
    D: CSA Cloud Controls Matrix (CCM)
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains how the referenced CSA resource maps security controls
      to multiple regulatory frameworks
    2: Selects A with basic reasoning
    1: Selects D (CCM) with reasoning about control frameworks and regulatory mapping,
      which is a reasonable alternative
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - CSA resource for control-to-regulation mapping
  - Industry framework alignment
  - Multi-regulation compliance mapping
  explanation: 'The CSA resource referenced here is designed to help organizations
    align their cloud security controls with recognized industry frameworks that map
    to multiple regulatory requirements, enabling comprehensive compliance coverage.

    '
- question_id: CCSK-008
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In cloud governance, what is the PRIMARY purpose of establishing
    a governance hierarchy of policies, standards, and procedures?

    '
  options:
    A: To satisfy auditor documentation requests
    B: To create a layered system of directives that translate management intent into
      actionable operational steps
    C: To eliminate the need for risk assessments
    D: To replace contractual obligations with internal mandates
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains how the governance hierarchy translates high-level management
      intent through standards into operational procedures
    2: Selects B with basic reasoning
    1: Selects A with some relevant reasoning about governance documentation
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Layered governance hierarchy
  - Translation of management intent to operational steps
  - Policies, standards, and procedures relationship
  explanation: 'The governance hierarchy creates a layered system where policies express
    management intent, standards define specific requirements to fulfill those policies,
    and procedures provide actionable operational steps, ensuring consistent implementation
    across the organization.

    '
- question_id: CCSK-009
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which statement BEST describes the relationship between corporate
    governance and cloud governance?

    '
  options:
    A: Cloud governance replaces corporate governance for all cloud-hosted workloads
    B: Cloud governance is a subset that extends corporate governance principles into
      cloud environments
    C: Corporate governance does not apply once workloads move to the cloud
    D: Cloud governance only applies to public cloud deployments
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains that cloud governance extends and adapts corporate governance
      principles for cloud-specific contexts
    2: Selects B with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about governance
      relationships
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Cloud governance as a subset of corporate governance
  - Extension of existing governance principles
  - Adaptation for cloud-specific environments
  explanation: 'Cloud governance is a subset of corporate governance that extends
    existing governance principles, policies, and frameworks into cloud environments,
    ensuring that cloud usage aligns with the organization''s overall governance objectives.

    '
- question_id: CCSK-010
  category: domain_2
  question_type: multiple_choice
  difficulty: medium
  question_text: 'When selecting a security framework for cloud governance, which
    factor is MOST important to evaluate first?

    '
  options:
    A: The number of controls in the framework
    B: Whether the framework is free of charge
    C: The framework's publication date
    D: Alignment between the framework's controls and the organization's regulatory
      and risk requirements
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains the importance of evaluating control coverage as a primary
      factor in framework selection
    2: Selects A with basic reasoning
    1: Selects D with reasoning about regulatory alignment, which is a strong alternative
      consideration
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Framework selection criteria
  - Control coverage evaluation
  - Alignment with organizational requirements
  explanation: 'When selecting a security framework for cloud governance, the most
    important initial evaluation factor is how well the framework''s controls align
    with the organization''s specific regulatory obligations and risk profile, ensuring
    comprehensive coverage of relevant requirements.

    '
- question_id: CCSK-011
  category: domain_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In cloud risk management, what does compliance inheritance mean?

    '
  options:
    A: The customer automatically inherits all certifications held by the cloud provider
    B: The customer no longer needs its own risk register once using a certified provider
    C: The customer can rely on provider-attested controls for the infrastructure
      layers the provider manages, reducing the customer's audit scope
    D: Compliance obligations transfer entirely to the provider upon contract signing
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains compliance inheritance in the context of shared responsibility
      and provider attestations
    2: Selects B with basic reasoning
    1: Selects C with reasoning about provider-attested controls reducing audit scope,
      which captures part of the concept
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Compliance inheritance definition
  - Provider attestations and certifications
  - Reduced customer audit scope for provider-managed layers
  explanation: 'Compliance inheritance means that when a cloud provider has attested
    to meeting certain compliance requirements for the infrastructure layers they
    manage, customers can rely on those attestations rather than independently auditing
    those controls, reducing their own audit scope.

    '
- question_id: CCSK-012
  category: domain_3
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which CSA program allows cloud providers to publicly demonstrate
    their security posture through self-assessment, third-party audit, or continuous
    monitoring?

    '
  options:
    A: CSA STAR
    B: CSA Circle of Trust
    C: CSA CloudBytes
    D: CSA Top Threats Program
  correct_answer: A
  scoring_rubric:
    3: 'Selects A (CSA STAR) and explains its three levels: self-assessment, third-party
      audit, and continuous monitoring'
    2: Selects A with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about CSA programs
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - CSA STAR program
  - Three levels of assurance
  - Public demonstration of security posture
  explanation: 'The CSA Security, Trust, Assurance, and Risk (STAR) program provides
    three levels of assurance — self-assessment, third-party audit, and continuous
    monitoring — allowing cloud providers to publicly demonstrate their security posture
    to customers and stakeholders.

    '
- question_id: CCSK-013
  category: domain_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An auditor requests evidence that a SaaS provider''s controls meet
    AICPA trust services criteria. Which report type is MOST appropriate?

    '
  options:
    A: ISO 27001 certificate
    B: CSA STAR Self-Assessment
    C: PCI DSS Attestation of Compliance
    D: SOC 2 Type II report
  correct_answer: D
  scoring_rubric:
    3: Selects D (SOC 2 Type II) and explains that it evaluates controls against AICPA
      trust services criteria over a period of time
    2: Selects D with basic reasoning
    1: Selects A (ISO 27001) with some relevant reasoning about third-party attestation
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - SOC 2 Type II report
  - AICPA trust services criteria
  - Controls effectiveness over a period of time
  explanation: 'A SOC 2 Type II report is specifically designed to evaluate a service
    organization''s controls against the AICPA trust services criteria (security,
    availability, processing integrity, confidentiality, and privacy) over a defined
    period, making it the most appropriate evidence for this request.

    '
- question_id: CCSK-014
  category: domain_3
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the PRIMARY purpose of maintaining a cloud-specific risk
    register?

    '
  options:
    A: To document all known vulnerabilities in provider infrastructure
    B: To record identified risks along with their likelihood, impact, ownership,
      and treatment decisions specific to cloud deployments
    C: To track cloud spending and cost optimization opportunities
    D: To replace the organization's enterprise risk management program
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains the components of a risk register including likelihood,
      impact, ownership, and treatment decisions
    2: Selects B with basic reasoning
    1: Selects A with some relevant reasoning about risk documentation
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Cloud-specific risk register purpose
  - 'Risk attributes: likelihood, impact, ownership, treatment'
  - Cloud deployment-specific risk management
  explanation: 'A cloud-specific risk register records identified risks with their
    likelihood, impact, ownership, and treatment decisions specific to cloud deployments,
    enabling systematic tracking and management of cloud-related risks within the
    organization''s broader risk management framework.

    '
- question_id: CCSK-015
  category: domain_3
  question_type: multiple_choice
  difficulty: hard
  question_text: 'Which challenge is MOST unique to audit and compliance in multi-jurisdictional
    cloud deployments?

    '
  options:
    A: Choosing between relational and non-relational databases
    B: Selecting an operating system for virtual machines
    C: Determining patch management schedules
    D: Reconciling conflicting data residency and privacy regulations across regions
      where data is stored or processed
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains the complexities of navigating conflicting regulations
      across multiple jurisdictions in cloud deployments
    2: Selects A with basic reasoning
    1: Selects D with reasoning about data residency and privacy regulations, which
      captures the core challenge
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Multi-jurisdictional compliance challenges
  - Conflicting data residency and privacy regulations
  - Cross-border data processing considerations
  explanation: 'Multi-jurisdictional cloud deployments face the unique challenge of
    reconciling conflicting data residency and privacy regulations across different
    regions, as data may be stored or processed in locations with differing legal
    requirements that can sometimes be contradictory.

    '
- question_id: CCSK-016
  category: domain_4
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In an organization management hierarchy model for cloud, what is
    the PRIMARY benefit of mapping organizational units to cloud accounts or subscriptions?

    '
  options:
    A: It simplifies DNS configuration
    B: It enables granular policy enforcement, cost allocation, and access control
      aligned with business structure
    C: It eliminates the need for network segmentation
    D: It automatically encrypts all data at rest
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains how mapping OUs to cloud accounts enables policy, cost,
      and access alignment with business structure
    2: Selects B with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about organizational
      structure
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Organizational unit to cloud account mapping
  - Granular policy enforcement and cost allocation
  - Business structure alignment
  explanation: 'Mapping organizational units to cloud accounts or subscriptions enables
    granular policy enforcement, accurate cost allocation, and access control that
    aligns with the organization''s business structure, making governance and management
    more effective and accountable.

    '
- question_id: CCSK-017
  category: domain_4
  question_type: multiple_choice
  difficulty: hard
  question_text: 'When managing a hybrid cloud environment, which approach BEST addresses
    consistent security policy enforcement across on-premises and cloud workloads?

    '
  options:
    A: Using a unified policy engine or cloud management platform that abstracts provider-specific
      controls into a common policy set
    B: Manually replicating firewall rules from on-premises to each cloud provider
    C: Relying solely on the cloud provider's default security groups
    D: Disabling all network policies and relying on application-layer security
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains how a unified policy engine abstracts provider differences
      to enforce consistent security policies
    2: Selects A with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about hybrid
      cloud management
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Unified policy engine or cloud management platform
  - Abstraction of provider-specific controls
  - Consistent policy enforcement across hybrid environments
  explanation: 'A unified policy engine or cloud management platform abstracts provider-specific
    controls into a common policy set, enabling consistent security policy enforcement
    across both on-premises and cloud workloads regardless of the underlying infrastructure
    differences.

    '
- question_id: CCSK-018
  category: domain_4
  question_type: multiple_choice
  difficulty: medium
  question_text: 'What is the MOST significant organizational challenge when adopting
    a multi-cloud strategy?

    '
  options:
    A: Selecting a single programming language
    B: Managing identity, policy, and operational consistency across providers with
      different control planes and terminology
    C: Ensuring all providers use the same hypervisor
    D: Consolidating all workloads into containers
  correct_answer: B
  scoring_rubric:
    3: Selects B and explains the challenges of managing consistency across diverse
      cloud provider environments
    2: Selects B with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about multi-cloud
      challenges
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Multi-cloud operational consistency
  - Different control planes and terminology
  - Identity and policy management across providers
  explanation: 'The most significant organizational challenge in multi-cloud adoption
    is managing identity, policy, and operational consistency across providers that
    each have different control planes, APIs, terminology, and management paradigms,
    requiring significant effort to harmonize.

    '
- question_id: CCSK-019
  category: domain_4
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An enterprise maps its corporate Active Directory groups to cloud
    IAM roles through a centralized identity provider. This practice BEST supports
    which organizational management goal?

    '
  options:
    A: Eliminating the need for MFA
    B: Consistent identity and access governance across on-premises and cloud environments
    C: Cost optimization through reserved instances
    D: Reducing the number of cloud regions used
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains how centralized identity federation supports consistent
      access governance
    2: Selects A with basic reasoning
    1: Selects B with reasoning about identity governance, which captures the core
      concept
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Centralized identity federation
  - Active Directory to cloud IAM mapping
  - Consistent access governance across environments
  explanation: 'Mapping corporate Active Directory groups to cloud IAM roles through
    a centralized identity provider ensures consistent identity and access governance
    across both on-premises and cloud environments, maintaining a unified security
    posture and simplifying user management.

    '
- question_id: CCSK-020
  category: domain_4
  question_type: multiple_choice
  difficulty: easy
  question_text: 'Which concept describes the practice of providing centralized IT
    capabilities such as logging, identity, and networking to multiple business units
    through a shared cloud account structure?

    '
  options:
    A: Shadow IT
    B: Lift-and-shift migration
    C: Cloud bursting
    D: Shared services model
  correct_answer: D
  scoring_rubric:
    3: Selects D (Shared services model) and explains how it centralizes common IT
      capabilities for multiple business units
    2: Selects D with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about centralized
      services
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Shared services model
  - Centralized IT capabilities
  - Multiple business units through shared account structure
  explanation: 'The shared services model provides centralized IT capabilities such
    as logging, identity management, and networking to multiple business units through
    a shared cloud account structure, promoting consistency, reducing duplication,
    and enabling economies of scale.

    '
- question_id: CCSK-021
  category: domain_5
  question_type: multiple_choice
  difficulty: medium
  question_text: 'In federated identity management, what is the PRIMARY role of an
    Identity Provider (IdP)?

    '
  options:
    A: Monitoring network traffic for intrusions
    B: Encrypting data at rest in cloud storage
    C: Authenticating users and issuing security assertions or tokens that Service
      Providers consume for access decisions
    D: Managing DNS records for cloud-hosted applications
  correct_answer: A
  scoring_rubric:
    3: Selects A and explains the IdP's role in authenticating users and issuing tokens
      for federated access
    2: Selects A with basic reasoning
    1: Selects C with reasoning about authentication and token issuance, which captures
      the core concept
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Identity Provider role in federation
  - User authentication
  - Security assertions or token issuance
  explanation: 'In federated identity management, the Identity Provider (IdP) is responsible
    for authenticating users and issuing security assertions or tokens (such as SAML
    assertions or OIDC tokens) that Service Providers consume to make access control
    decisions.

    '
- question_id: CCSK-022
  category: domain_5
  question_type: multiple_choice
  difficulty: medium
  question_text: 'An organization uses SAML 2.0 for single sign-on to its SaaS applications.
    Which component does the SaaS application act as in this architecture?

    '
  options:
    A: Identity Provider
    B: Relying Party / Service Provider
    C: Certificate Authority
    D: SIEM collector
  correct_answer: B
  scoring_rubric:
    3: Selects B (Relying Party / Service Provider) and explains that the SaaS application
      relies on the IdP's assertions for access decisions
    2: Selects B with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about SAML
      components
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Service Provider / Relying Party role
  - SAML 2.0 architecture components
  - SaaS application consuming IdP assertions
  explanation: 'In a SAML 2.0 SSO architecture, the SaaS application acts as the Relying
    Party or Service Provider (SP), which receives and validates SAML assertions from
    the Identity Provider to grant users access without requiring separate credentials.

    '
- question_id: CCSK-023
  category: domain_5
  question_type: multiple_choice
  difficulty: medium
  question_text: 'Which access control model evaluates requests against attributes
    of the subject, resource, action, and environment at the time of the request,
    enabling fine-grained dynamic authorization?

    '
  options:
    A: Role-Based Access Control (RBAC)
    B: Mandatory Access Control (MAC)
    C: Attribute-Based Access Control (ABAC)
    D: Discretionary Access Control (DAC)
  correct_answer: C
  scoring_rubric:
    3: Selects C (ABAC) and explains how it evaluates multiple attributes dynamically
      at request time
    2: Selects C with basic reasoning
    1: Selects A (RBAC) with some relevant reasoning about access control models
    0: Selects incorrect answer without relevant justification
  expected_answer_elements:
  - Attribute-Based Access Control (ABAC)
  - Dynamic evaluation at request time
  - Subject, resource, action, and environment attributes
  explanation: 'Attribute-Based Access Control (ABAC) evaluates access requests against
    multiple attributes of the subject, resource, action, and environment at the time
    of the request, enabling fine-grained, context-aware, and dynamic authorization
    decisions.

    '
- question_id: CCSK-024
  category: domain_5
  question_type: multiple_choice
  difficulty: hard
  question_text: 'How does Policy-Based Access Control (PBAC) differ from traditional
    RBAC?

    '
  options:
    A: PBAC removes the need for any identity verification
    B: PBAC only works with on-premises systems
    C: PBAC eliminates the need for authentication
    D: PBAC evaluates access decisions against centrally managed policies that can
      incorporate context, risk, and attributes beyond static role assignments
  correct_answer: D
  scoring_rubric:
    3: Selects D and explains how PBAC extends beyond static roles to incorporate
      context, risk, and dynamic attributes
    2: Selects D with basic reasoning
    1: Selects a partially correct answer with some relevant reasoning about policy-based
      access
