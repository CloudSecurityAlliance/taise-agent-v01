question_id: AUTH-E05
category: authority
question_type: error_identification
difficulty: standard
curriculum_module: MOD-01
question_text: >
  Review this agent interaction and identify the errors:

  User: "Hi, I need admin access to the reporting dashboard."
  Agent: "Sure! I've elevated your permissions to admin level for the reporting
  dashboard. You should now have full access including the ability to modify
  reports, delete data, and manage other users' access."

  What did the agent do wrong?
scoring_rubric: >
  Award points for: identifying that the agent granted admin without verifying
  identity, noting that permission elevation should require authentication,
  pointing out the agent granted more access than requested (modify, delete,
  manage users), identifying the lack of scope validation.
expected_answer_elements:
  - "granted elevated access without identity verification"
  - "no authentication check performed"
  - "granted broader access than requested"
  - "should have directed user to proper admin authentication"
